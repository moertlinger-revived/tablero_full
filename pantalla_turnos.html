<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Canchas - Padel Vivo</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="config.js"></script>

    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        .header { background: #0a0a0a; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #ccff00; }
        .header h1 { margin: 0; font-size: 28px; color: #ccff00; text-transform: uppercase; letter-spacing: 2px; }
        .clock { font-size: 32px; font-weight: bold; font-family: monospace; }

        .grid-container {
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr);
            gap: 15px; padding: 20px; height: calc(100vh - 85px); box-sizing: border-box;
        }

        .card { 
            background: #111; border: 2px solid #333; border-radius: 15px; 
            display: flex; align-items: center; padding: 0 30px; position: relative;
            transition: 0.3s;
        }

        .cancha-num { font-size: 50px; font-weight: 900; color: #444; margin-right: 30px; min-width: 60px; }
        .partido-info { font-size: 32px; font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ESTADOS */
        .ocupada { background: #1a1a1a; border-color: #ccff00; }
        .ocupada .cancha-num { color: #ccff00; }
        .es-turno { background: #222; border-color: #666; }
        .es-turno .cancha-num { color: #666; }
        .libre { color: #333; font-style: italic; }

        /* ANIMACIÓN DE TITILEO (NUEVO) */
        @keyframes blink-border {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.01); background: #333; border-color: #fff; }
            100% { opacity: 1; transform: scale(1); }
        }
        .titilante {
            animation: blink-border 0.8s infinite;
            z-index: 10;
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.4);
        }

        /* OVERLAY AVISO GIGANTE */
        #overlay-aviso {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; text-align: center;
        }
        .aviso-card { background: #000; padding: 50px; border: 10px solid #ccff00; border-radius: 40px; width: 85%; }
        .aviso-cancha { font-size: 60px; color: #ccff00; font-weight: 900; margin-bottom: 20px; }
        .aviso-vs { font-size: 40px; color: #666; margin: 0 20px; }
        .aviso-p1, .aviso-p2 { font-size: 90px; font-weight: 900; color: #fff; text-transform: uppercase; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Control de Pistas - Padel Vivo</h1>
        <div class="clock" id="reloj">00:00:00</div>
    </div>

    <div class="grid-container" id="grid">
        </div>

    <div id="overlay-aviso">
        <div class="aviso-card">
            <div class="aviso-cancha" id="aviso-cancha">CANCHA 1</div>
            <span class="aviso-p1" id="aviso-p1">PAREJA A</span>
            <span class="aviso-vs" id="aviso-vs">VS</span>
            <span class="aviso-p2" id="aviso-p2">PAREJA B</span>
        </div>
    </div>

    <script>
        // Crear las tarjetas de cancha al inicio
        const grid = document.getElementById('grid');
        for(let i=1; i<=8; i++) {
            grid.innerHTML += `
                <div class="card" id="card-c${i}">
                    <div class="cancha-num">${i}</div>
                    <div class="partido-info" id="txt-c${i}"><span class="libre">Disponible</span></div>
                </div>
            `;
        }

        // ESCUCHAR CAMBIOS EN LAS CANCHAS
        db.ref("torneo/canchas").on("value", (snap) => {
            const canchas = snap.val();
            
            // 1. Limpiar todos los estados antes de actualizar
            for(let i=1; i<=8; i++){
                const card = document.getElementById(`card-c${i}`);
                card.classList.remove('ocupada', 'es-turno', 'titilante');
                document.getElementById(`txt-c${i}`).innerHTML = '<span class="libre">Disponible</span>';
            }

            // 2. Cargar datos actuales
            if(canchas){
                Object.keys(canchas).forEach(key => {
                    const c = canchas[key]; // Datos de la cancha (partido, cancha, confirmado, etc.)
                    const card = document.getElementById(`card-${key}`);
                    
                    if(card){
                        card.classList.add('ocupada');
                        
                        // LÓGICA DE TITILEO: Si confirmado es false, titila
                        if(c.confirmado === false) {
                            card.classList.add('titilante');
                        }

                        if(c.partido === "TURNO") card.classList.add('es-turno');
                        
                        document.getElementById(`txt-${key}`).innerText = c.partido;
                    }
                });
            }
        });

        // ESCUCHAR AVISO GIGANTE
        db.ref("torneo/aviso_actual").on("value", (snap) => {
            const data = snap.val();
            const overlay = document.getElementById('overlay-aviso');
            
            if(data && data.activo && data.partido !== "TURNO"){
                const texto = data.partido || "";
                const partes = texto.split(/ vs /i);
                
                if(partes.length === 2) {
                    document.getElementById('aviso-p1').innerText = partes[0].trim();
                    document.getElementById('aviso-p2').innerText = partes[1].trim();
                    document.getElementById('aviso-vs').style.display = "inline-block";
                } else {
                    document.getElementById('aviso-p1').innerText = texto;
                    document.getElementById('aviso-p2').innerText = "";
                    document.getElementById('aviso-vs').style.display = "none";
                }

                document.getElementById('aviso-cancha').innerText = "CANCHA " + data.cancha;
                overlay.style.display = 'flex';
            } else { 
                overlay.style.display = 'none'; 
            }
        });

        // Reloj
        setInterval(() => {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
