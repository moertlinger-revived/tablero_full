<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUEZ PADEL CONTROL - V49.2 stable</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="config.js"></script>

    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 5px; text-align: center; padding-top: 30px; }
        .version-tag { position: fixed; top: 5px; left: 5px; font-size: 10px; color: #aaa; font-weight: bold; z-index: 9999; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 3px; }
        
        .encabezado { background: #222; padding: 10px; border-radius: 10px; margin-bottom: 5px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .config-regla { background: #333; color: #fff; border: 2px solid #555; padding: 10px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; min-width: 95px; }
        .config-regla.activo { background: #ccff00; color: #000; border-color: #fff; }
        
        .btn-reset-total { background: #d32f2f; color: #fff; border: 2px solid #f00; padding: 10px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; }
        
        .zona-tiempos { display: flex; justify-content: space-around; background: #111; padding: 8px; border-radius: 10px; margin-bottom: 5px; border: 1px solid #333; }
        .timer-box { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .timer-label { font-size: 8px; color: #aaa; font-weight: bold; }
        .timer-val { font-family: monospace; font-size: 18px; color: #ccff00; font-weight: bold; }
        
        .btn-t { font-size: 10px; padding: 5px 10px; background: #444; color: #fff; border: none; border-radius: 3px; cursor: pointer; transition: 0.3s; }
        /* Estilos para el botón de tiempo activo */
        .btn-t.playing { background: #28a745; color: white; box-shadow: 0 0 10px rgba(40, 167, 69, 0.5); }

        .equipo-contenedor { background: #111; border: 2px solid #333; border-radius: 12px; padding: 10px; margin-bottom: 8px; }
        .fila-jugador { display: flex; align-items: center; justify-content: space-between; background: #222; margin-bottom: 5px; padding: 8px; border-radius: 8px; border: 2px solid transparent; }
        .fila-jugador.sirviendo { border-color: #ccff00; background: #2a2a00; }
        .nombre-j { font-size: 14px; font-weight: bold; flex-grow: 1; text-align: left; }
        
        .puntos-display { font-size: 55px; font-weight: 900; color: #c6a052; margin: 5px 0; }
        .btn-punto { width: 100%; padding: 15px; background: #c6a052; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; color: #000; }
        
        .aviso-cambio { background: #ffcc00; color: #000; padding: 20px; font-size: 22px; font-weight: 900; border-radius: 12px; position: fixed; top: 10%; left: 5%; width: 90%; z-index: 1000; display: none; border: 5px solid #fff; box-shadow: 0 0 40px rgba(0,0,0,0.8); cursor: pointer; }
    </style>
</head>
<body onload="render()">
    <div class="version-tag">CONTROL TABLERO REVIVED (VER. 49.3)</div>
    
    <div class="encabezado">
        <button class="config-regla" onclick="cambiarReglaTB()" id="btn-regla">TB: 6-6</button>
        <button class="config-regla" onclick="cicloSTB()" id="btn-stb">3er SET: NORMAL</button>
        <button class="config-regla" onclick="togglePuntoOro()" id="btn-oro">ORO: NO</button>
        <button class="config-regla" style="background:#555;" onclick="deshacer()">↩ CORREGIR</button>
        <button class="btn-reset-total" onclick="resetTotal()">⚠️ RESET</button>
    </div>

    <div class="zona-tiempos">
        <div class="timer-box">
            <span class="timer-label">CALENTAMIENTO</span><span id="disp-peloteo" class="timer-val">05:00</span>
            <div>
                <button id="btn-play-peloteo" class="btn-t" onclick="toggleTimer('peloteo')">PLAY</button>
                <button class="btn-t" onclick="resetTimer('peloteo')">RESET</button>
            </div>
        </div>
        <div class="timer-box">
            <span class="timer-label">TIEMPO PARTIDO</span><span id="disp-partido" class="timer-val">00:00:00</span>
            <div>
                <button id="btn-play-partido" class="btn-t" onclick="toggleTimer('partido')">INICIAR PARTIDO</button>
            </div>
        </div>
    </div>

    <div class="tablero-juez">
        <div class="equipo-contenedor">
            <div class="fila-jugador" id="f-j0"><span class="nombre-j" id="n0" onclick="cambiarNombre(0)">J1A</span><button class="btn-t" onclick="definirSaque(0)">SAQUE</button></div>
            <div class="fila-jugador" id="f-j1"><span class="nombre-j" id="n1" onclick="cambiarNombre(1)">J1B</span><button class="btn-t" onclick="definirSaque(1)">SAQUE</button></div>
            <div class="puntos-display" id="pA">0</div>
            <button class="btn-punto" onclick="sumar(0)">+ EQ 1</button>
        </div>
        <div class="equipo-contenedor">
            <div class="fila-jugador" id="f-j2"><span class="nombre-j" id="n2" onclick="cambiarNombre(2)">J2A</span><button class="btn-t" onclick="definirSaque(2)">SAQUE</button></div>
            <div class="fila-jugador" id="f-j3"><span class="nombre-j" id="n3" onclick="cambiarNombre(3)">J2B</span><button class="btn-t" onclick="definirSaque(3)">SAQUE</button></div>
            <div class="puntos-display" id="pB">0</div>
            <button class="btn-punto" onclick="sumar(1)">+ EQ 2</button>
        </div>
    </div>

    <script>
        // VARIABLES GLOBALES
        let pts = [0,0];
        let historialSets = [[0,0,0], [0,0,0]];
        let setActualIdx = 0;
        let modo = "NORMAL"; // O "TIEBREAK"
        let limiteTB = 6;
        let puntoOroActivo = false;
        let modoSTB = 0;
        let finalizado = false;
        let saqueJugadorIdx = -1;

        // VARIABLES DE TIEMPO
        let segP = 0; 
        let segPel = 300;
        let runP = false; 
        let runPel = false;
        let startTimePartido = 0;
        let acumuladoPasado = 0;

        // BUCLE DE RELOJ
        setInterval(() => {
            if(runP) {
                segP = acumuladoPasado + Math.floor((Date.now() - startTimePartido) / 1000);
                actualizarRelojes();
            }
            if(runPel && segPel > 0) {
                segPel--;
                actualizarRelojes();
            }
        }, 1000);

        function toggleTimer(t) {
            const btnP = document.getElementById('btn-play-partido');
            const btnPel = document.getElementById('btn-play-peloteo');

            if(t === 'partido') {
                runP = !runP;
                if(runP) {
                    startTimePartido = Date.now();
                    btnP.innerText = "PAUSAR PARTIDO";
                    btnP.classList.add('playing');
                } else {
                    acumuladoPasado = segP;
                    btnP.innerText = "REANUDAR";
                    btnP.classList.remove('playing');
                }
            } else {
                runPel = !runPel;
                if(runPel) {
                    btnPel.innerText = "PAUSA";
                    btnPel.classList.add('playing');
                } else {
                    btnPel.innerText = "PLAY";
                    btnPel.classList.remove('playing');
                }
            }
        }

        function resetTimer(t) {
            if(t === 'peloteo') {
                segPel = 300;
                runPel = false;
                document.getElementById('btn-play-peloteo').innerText = "PLAY";
                document.getElementById('btn-play-peloteo').classList.remove('playing');
                actualizarRelojes();
            }
        }

        function resetTotal() {
            if(!confirm("¿RESETEAR TODO EL PARTIDO A CERO?")) return;
            
            // 1. Reiniciar puntos y sets
            pts = [0,0];
            historialSets = [[0,0,0], [0,0,0]];
            setActualIdx = 0;
            modo = "NORMAL";
            finalizado = false;
            saqueJugadorIdx = -1;

            // 2. Reiniciar reloj de partido
            runP = false;
            segP = 0;
            acumuladoPasado = 0;
            startTimePartido = 0;
            
            const btnP = document.getElementById('btn-play-partido');
            btnP.innerText = "INICIAR PARTIDO";
            btnP.classList.remove('playing');

            render();
        }

        function actualizarRelojes() {
            let h = Math.floor(segP/3600), m = Math.floor((segP%3600)/60), s = segP%60;
            document.getElementById('disp-partido').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            
            let mp = Math.floor(segPel/60), sp = segPel%60;
            document.getElementById('disp-peloteo').innerText = `${mp.toString().padStart(2,'0')}:${sp.toString().padStart(2,'0')}`;
        }

        function render() {
            const labels = ["0","15","30","40","Ad"];
            document.getElementById('pA').innerText = modo === "NORMAL" ? labels[pts[0]] : pts[0];
            document.getElementById('pB').innerText = modo === "NORMAL" ? labels[pts[1]] : pts[1];
            
            for(let i=0; i<4; i++) {
                document.getElementById(`f-j${i}`).classList.toggle('sirviendo', saqueJugadorIdx === i);
            }

            // Sincronizar con Firebase
            db.ref("marcador/actual").set({
                n0: document.getElementById('n0').innerText,
                n1: document.getElementById('n1').innerText,
                n2: document.getElementById('n2').innerText,
                n3: document.getElementById('n3').innerText,
                p0: document.getElementById('pA').innerText,
                p1: document.getElementById('pB').innerText,
                h0: historialSets[0],
                h1: historialSets[1],
                final: finalizado
            });
            actualizarRelojes();
        }

        function sumar(eq) {
            if(finalizado) return;
            if(modo === "NORMAL") {
                if(pts[eq] < 3) pts[eq]++;
                else { pts = [0,0]; historialSets[eq][setActualIdx]++; }
            } else {
                pts[eq]++;
            }
            render();
        }

        function definirSaque(i) { saqueJugadorIdx = i; render(); }
        function cambiarNombre(i) { let n = prompt("Nuevo nombre:"); if(n) document.getElementById('n'+i).innerText = n.toUpperCase(); render(); }
    </script>
</body>
</html>
