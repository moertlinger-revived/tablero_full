<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUEZ PADEL CONTROL - V49.2 stable</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="config.js"></script>

    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 5px; text-align: center; padding-top: 30px; /* Espacio para la barra superior */ }
        
        /* Ajuste para que la versión sea visible */
        .version-tag { 
            position: fixed; 
            top: 5px; 
            left: 5px; 
            font-size: 10px; 
            color: #aaa; /* Color más suave para no distraer */
            font-weight: bold; 
            z-index: 9999;
            background: rgba(0,0,0,0.5);
            padding: 2px 5px;
            border-radius: 4px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 10px;
        }

        .logo {
            color: #ccff00;
            font-weight: 900;
            font-size: 20px;
        }

        .score-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #111;
            padding: 20px 10px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid #222;
        }

        .team-box {
            flex: 1;
        }

        .points {
            font-size: 80px;
            font-weight: 900;
            margin: 10px 0;
            line-height: 1;
        }

        .team-name {
            font-size: 14px;
            color: #888;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Botonera de puntos */
        .btn-punto {
            width: 100%;
            height: 120px;
            border: none;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: #000;
        }

        .btn-a { background: #ccff00; }
        .btn-b { background: #ccff00; }

        .sets-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
        }

        .set-col {
            text-align: center;
        }

        .set-label {
            font-size: 10px;
            color: #666;
            margin-bottom: 5px;
        }

        .set-score {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            background: #000;
            padding: 5px 12px;
            border-radius: 5px;
            border: 1px solid #333;
        }

        .set-score.actual {
            border-color: #ccff00;
            color: #ccff00;
        }

        /* Jugadores y Saque */
        .players-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .player-card {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid transparent;
            position: relative;
        }

        .player-card.sirviendo {
            border-color: #ccff00;
            background: #1a1a1a;
        }

        .player-card.sirviendo::after {
            content: "🎾";
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 12px;
        }

        .player-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Controles Inferiores */
        .controls-footer {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .btn-footer {
            background: #222;
            border: 1px solid #333;
            color: #fff;
            padding: 12px 5px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-footer.activo {
            background: #ccff00;
            color: #000;
            border-color: #ccff00;
        }

        .btn-undo {
            background: #440000;
            color: #ffaaaa;
        }

        .btn-reset {
            background: #444;
        }
    </style>
</head>
<body>

    <div class="version-tag">V49.2 STABLE</div>

    <div class="header">
        <div class="logo">PADEL VIVO</div>
        <div id="status" style="font-size: 10px; color: #555;">CONECTADO</div>
    </div>

    <div class="sets-display" id="sets-container">
        <div class="set-col">
            <div class="set-label">S1</div>
            <div class="set-score" id="s1-0">0</div>
            <div class="set-score" id="s1-1" style="margin-top:5px">0</div>
        </div>
        <div class="set-col">
            <div class="set-label">S2</div>
            <div class="set-score" id="s2-0">0</div>
            <div class="set-score" id="s2-1" style="margin-top:5px">0</div>
        </div>
        <div class="set-col">
            <div class="set-label">S3</div>
            <div class="set-score" id="s3-0">0</div>
            <div class="set-score" id="s3-1" style="margin-top:5px">0</div>
        </div>
    </div>

    <div class="score-container">
        <div class="team-box">
            <div class="team-name" id="tA-label">PAREJA A</div>
            <div class="points" id="pA">0</div>
        </div>
        <div style="font-size: 20px; font-weight: 900; color: #333;">VS</div>
        <div class="team-box">
            <div class="team-name" id="tB-label">PAREJA B</div>
            <div class="points" id="pB">0</div>
        </div>
    </div>

    <button class="btn-punto btn-a" onclick="ganarPunto(0)">Punto Pareja A</button>
    <button class="btn-punto btn-b" onclick="ganarPunto(1)">Punto Pareja B</button>

    <div class="players-grid">
        <div class="player-card" id="f-j0" onclick="cambiarSaque(0)">
            <span class="player-name" id="n0" contenteditable="true">JUGADOR 1</span>
        </div>
        <div class="player-card" id="f-j2" onclick="cambiarSaque(2)">
            <span class="player-name" id="n2" contenteditable="true">JUGADOR 2</span>
        </div>
        <div class="player-card" id="f-j1" onclick="cambiarSaque(1)">
            <span class="player-name" id="n1" contenteditable="true">JUGADOR 3</span>
        </div>
        <div class="player-card" id="f-j3" onclick="cambiarSaque(3)">
            <span class="player-name" id="n3" contenteditable="true">JUGADOR 4</span>
        </div>
    </div>

    <div class="controls-footer">
        <button class="btn-footer" id="btn-regla" onclick="toggleReglaTB()">TB: 7-7</button>
        <button class="btn-footer" id="btn-stb" onclick="toggleModoSTB()">3er SET: NORMAL</button>
        <button class="btn-footer" id="btn-oro" onclick="toggleOro()">ORO: SÍ</button>
        <button class="btn-footer btn-undo" onclick="deshacer()">Deshacer</button>
        <button class="btn-footer btn-reset" onclick="resetTotal()">Reiniciar</button>
        <button class="btn-footer" onclick="window.location.reload()">Refrescar</button>
    </div>

<script>
    // Variables de estado
    let pts = [0, 0];
    let juegos = [0, 0];
    let sets = [0, 0];
    let historialSets = [[0, 0, 0], [0, 0, 0]];
    let modo = "NORMAL"; // NORMAL o TIEBREAK
    let limiteTB = 7;
    let modoSTB = 0; // 0:Normal, 1:SuperTB(10), 2:SuperTB(11)
    let puntoOroActivo = true;
    let saqueJugadorIdx = 0; // 0 o 2 para Equipo A, 1 o 3 para Equipo B
    
    // Historial para deshacer
    let stack = [];

    function guardarEstado() {
        stack.push(JSON.stringify({
            pts: [...pts],
            juegos: [...juegos],
            sets: [...sets],
            h: [ [...historialSets[0]], [...historialSets[1]] ],
            m: modo,
            s: saqueJugadorIdx
        }));
        if(stack.length > 10) stack.shift();
    }

    function deshacer() {
        if(stack.length === 0) return;
        const e = JSON.parse(stack.pop());
        pts = e.pts;
        juegos = e.juegos;
        sets = e.sets;
        historialSets = e.h;
        modo = e.m;
        saqueJugadorIdx = e.s;
        render();
    }

    function toggleReglaTB() {
        limiteTB = (limiteTB === 7) ? 5 : 7;
        render();
    }

    function toggleModoSTB() {
        modoSTB = (modoSTB + 1) % 3;
        render();
    }

    function toggleOro() {
        puntoOroActivo = !puntoOroActivo;
        render();
    }

    function cambiarSaque(idx) {
        saqueJugadorIdx = idx;
        render();
    }

    function ganarPunto(i) {
        guardarEstado();
        pts[i]++;
        const totalPuntosTB = pts[0] + pts[1];

        if (modo === "TIEBREAK") {
            // LÓGICA DE SAQUE TIE-BREAK (1-2-2-2)
            // El primer jugador saca 1 vez (punto 0). 
            // Luego el saque cambia cada vez que el total de puntos es IMPAR (1, 3, 5, 7...).
            if (totalPuntosTB % 2 !== 0) {
                saqueJugadorIdx = (saqueJugadorIdx + 1) % 4;
            }

            // Verificar fin de Tie-break
            if (pts[i] >= limiteTB && (pts[i] - pts[1-i] >= 2)) {
                sets[i]++;
                finalizarSet(i);
            }
        } else {
            // MODO NORMAL (0, 15, 30, 40, Oro/Ad)
            if (pts[i] >= 4 && (pts[i] - pts[1-i] >= 2 || (puntoOroActivo && pts[i] === 4 && pts[1-i] === 3))) {
                juegos[i]++;
                pts = [0, 0];
                // En modo normal el saque cambia siempre al finalizar el game
                saqueJugadorIdx = (saqueJugadorIdx + 1) % 4;
                verificarSet(i);
            }
        }
        render();
    }

    function verificarSet(i) {
        const jA = juegos[0];
        const jB = juegos[1];

        if (jA === 6 && jB === 6) {
            modo = "TIEBREAK";
            pts = [0, 0];
        } else if ((jA >= 6 && jA - jB >= 2) || jA === 7) {
            sets[0]++;
            finalizarSet(0);
        } else if ((jB >= 6 && jB - jA >= 2) || jB === 7) {
            sets[1]++;
            finalizarSet(1);
        }
    }

    function finalizarSet(i) {
        const setActualIdx = sets[0] + sets[1] - 1;
        historialSets[0][setActualIdx] = juegos[0];
        historialSets[1][setActualIdx] = juegos[1];
        
        if (sets[0] === 2 || sets[1] === 2) {
            // alert("PARTIDO FINALIZADO");
        } else {
            juegos = [0, 0];
            pts = [0, 0];
            modo = "NORMAL";

            // Si es empate 1-1 y hay modo SuperTiebreak activado
            if (sets[0] + sets[1] === 2 && modoSTB > 0) {
                modo = "TIEBREAK";
                limiteTB = (modoSTB === 1) ? 10 : 11;
            }
        }
    }

    function resetTotal() {
        if(confirm("¿REINICIAR TODO EL PARTIDO?")) {
            pts = [0, 0];
            juegos = [0, 0];
            sets = [0, 0];
            historialSets = [[0, 0, 0], [0, 0, 0]];
            modo = "NORMAL";
            stack = [];
            render();
        }
    }

    function render() {
        // Puntos visuales
        const l = ["0", "15", "30", "40", "Ad"];
        document.getElementById('pA').innerText = modo === "NORMAL" ? l[pts[0]] : pts[0];
        document.getElementById('pB').innerText = modo === "NORMAL" ? l[pts[1]] : pts[1];
        
        // Historial
        document.getElementById('s1-0').innerText = historialSets[0][0];
        document.getElementById('s1-1').innerText = historialSets[1][0];
        document.getElementById('s2-0').innerText = historialSets[0][1];
        document.getElementById('s2-1').innerText = historialSets[1][1];
        document.getElementById('s3-0').innerText = historialSets[0][2];
        document.getElementById('s3-1').innerText = historialSets[1][2];

        // Botonera
        document.getElementById('btn-regla').innerText = `TB: ${limiteTB}-${limiteTB}`;
        document.getElementById('btn-regla').classList.toggle('activo', limiteTB === 5);
        document.getElementById('btn-stb').innerText = "3er SET: " + (modoSTB===0?"NORMAL":modoSTB===1?"STB(10)":"STB(11)");
        document.getElementById('btn-stb').classList.toggle('activo', modoSTB > 0);
        document.getElementById('btn-oro').innerText = "ORO: " + (puntoOroActivo?"SÍ":"NO");
        document.getElementById('btn-oro').classList.toggle('activo', puntoOroActivo);

        // Saque
        for(let i=0; i<4; i++) {
            document.getElementById(`f-j${i}`).classList.toggle('sirviendo', saqueJugadorIdx === i);
        }

        // Firebase Sync
        db.ref("marcador/actual").set({
            n0: document.getElementById('n0').innerText,
            n1: document.getElementById('n1').innerText,
            n2: document.getElementById('n2').innerText,
            n3: document.getElementById('n3').innerText,
            h0: historialSets[0],
            h1: historialSets[1],
            pts: pts,
            juegos: juegos,
            modo: modo,
            saque: saqueJugadorIdx
        });
    }

    // Auto-save nombres al editar
    document.querySelectorAll('.player-name').forEach(el => {
        el.addEventListener('input', render);
    });

    // Inicio
    render();
</script>
</body>
</html>
