<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>revived LIVE SCORE PRO - v11.6</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* CONFIGURACIÓN ESTRUCTURAL */
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .brand-header { 
            width: 100%; height: 60px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 40px; box-sizing: border-box; border-bottom: 2px solid #333; background: #0a0a0a; 
        }
        .title-main { font-size: 20px; font-weight: 900; color: #ccff00; text-transform: uppercase; letter-spacing: 2px; }
        .logo-top { height: 40px; object-fit: contain; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 10px 0; }

        /* HEADER DE ESTADO (Reloj y Avisos) */
        .header-status { width: 95%; max-width: 1200px; display: flex; align-items: center; margin-bottom: 10px; position: relative; }

        .timer-tv { 
            background: #111; padding: 5px 25px; border-radius: 8px; border: 1px solid #444; 
            height: 65px; display: flex; flex-direction: column; justify-content: center;
        }
        .t-label { font-size: 11px; color: #aaa; font-weight: 900; text-transform: uppercase; line-height: 1; }
        .t-val { font-size: 32px; color: #ccff00; font-family: monospace; font-weight: bold; line-height: 1; }

        .estilo-anuncio-amarillo { 
            background: #ffcc00; color: #000; border-radius: 12px; display: none; align-items: center; 
            justify-content: center; gap: 20px; height: 75px; padding: 0 45px; border: 4px solid #fff; 
            margin-left: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 0 20px rgba(255, 204, 0, 0.4); 
        }
        .msg-top { font-size: 36px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .val-descanso { font-size: 48px; font-weight: 900; color: #000; font-family: 'Arial Black', sans-serif; }

        .contenedor-alertas-puntos { position: absolute; right: 0; width: 220px; display: flex; justify-content: center; align-items: center; }
        #aviso-oro, #aviso-tiebreak-tv { 
            background: #222; border: 2px solid #444; border-radius: 8px; height: 65px; 
            display: none; align-items: center; justify-content: center; font-weight: 900; 
            text-transform: uppercase; box-sizing: border-box; width: 210px;
        }
        #aviso-oro { color: #ccff00; font-size: 32px; animation: titilar 0.6s infinite alternate; }
        #aviso-tiebreak-tv { color: #ff3333; font-size: 22px; }

        @keyframes titilar { from { opacity: 1; } to { opacity: 0.2; } }

        /* SCOREBOARD PRINCIPAL */
        #scoreboard { width: 95%; max-width: 1200px; background: #050515; border: 5px solid #333; border-radius: 12px; overflow: hidden; position: relative; }
        
        .labels-row { display: flex; background: rgba(255,255,255,0.05); font-size: 18px; color: #888; font-weight: bold; border-bottom: 3px solid #333; }
        .label-equipo { flex-grow: 1; padding: 10px 30px; }
        .label-box { width: 110px; text-align: center; padding: 10px 0; border-left: 2px solid #333; }

        .equipo-block { display: flex; border-bottom: 10px solid #333; height: 160px; }
        .equipo-block:last-child { border-bottom: none; }

        .nombres-col { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; background: #020208; gap: 10px; }
        .name-cell { font-size: 38px; font-weight: 900; text-transform: uppercase; padding-left: 30px; display: flex; align-items: center; gap: 20px; letter-spacing: -1px; }
        
        .box { width: 110px; display: flex; justify-content: center; align-items: center; font-size: 75px; font-weight: 900; border-left: 2px solid #333; background: #0a0a0a; }
        .pts-cell { width: 220px; display: flex; justify-content: center; align-items: center; font-size: 115px; font-weight: 900; background: #c6a052; color: #000; border-left: 5px solid #333; }
        .pts-cell.modo-tb { background: #111 !important; color: #c6a052 !important; font-size: 95px; }

        .bola { width: 28px; height: 28px; background: #ccff00; border-radius: 50%; box-shadow: 0 0 15px #ccff00; display: none; border: 3px solid #000; margin-left: 15px; }

        /* SPONSORS */
        .footer-auspiciantes { width: 100%; height: 90px; background: #000; display: flex; justify-content: center; align-items: center; gap: 80px; border-top: 2px solid #222; }
        .logo-sponsor { max-height: 80px; max-width: 200px; object-fit: contain; }

        #cartel-final { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: none; align-items: center; justify-content: center; border: 20px solid #ccff00; }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="title-main">revived <span style="color:#444">| LIVE SCORE</span></div>
        <img src="https://lh3.googleusercontent.com/u/0/d/1Sbun1g6OMSdNtM-6arDu5XUxH-NbLwwP" class="logo-top">
    </div>

    <div class="main-content">
        <div class="header-status">
            <div class="timer-tv">
                <span class="t-label" id="timer-title">TIEMPO PARTIDO</span>
                <span class="t-val" id="val-timer">00:00:00</span>
            </div>
            
            <div id="aviso-tv-top" class="estilo-anuncio-amarillo">
                <span class="msg-top" id="msg-tv-desc">CAMBIO DE LADO</span>
                <span class="val-descanso" id="descanso-tv-q">90</span>
            </div>

            <div id="aviso-final-top" class="estilo-anuncio-amarillo">
                <span class="msg-top">PARTIDO FINALIZADO</span>
            </div>

            <div class="contenedor-alertas-puntos">
                <div id="aviso-tiebreak-tv">TIE-BREAK</div>
                <div id="aviso-oro">ORO</div>
            </div>
        </div>

        <div id="scoreboard">
            <div id="cartel-final"><div style="font-size: 100px; font-weight: 900; color: #ccff00; text-align: center;">PARTIDO<br>FINALIZADO</div></div>
            
            <div class="labels-row">
                <div class="label-equipo">JUGADORES</div>
                <div class="label-box">SET 1</div>
                <div class="label-box">SET 2</div>
                <div class="label-box">SET 3</div>
                <div class="label-box" style="width:220px; color:#c6a052;">PUNTOS</div>
            </div>
            
            <div class="equipo-block">
                <div class="nombres-col">
                    <div class="name-cell"><span id="n0">EQUIPO 1A</span><div id="b0" class="bola"></div></div>
                    <div class="name-cell"><span id="n1">EQUIPO 1B</span><div id="b1" class="bola"></div></div>
                </div>
                <div class="box" id="s1-0">0</div><div class="box" id="s2-0">0</div><div class="box" id="s3-0">0</div><div class="pts-cell" id="pA">0</div>
            </div>

            <div class="equipo-block">
                <div class="nombres-col">
                    <div class="name-cell"><span id="n2">EQUIPO 2A</span><div id="b2" class="bola"></div></div>
                    <div class="name-cell"><span id="n3">EQUIPO 2B</span><div id="b3" class="bola"></div></div>
                </div>
                <div class="box" id="s1-1">0</div><div class="box" id="s2-1">0</div><div class="box" id="s3-1">0</div><div class="pts-cell" id="pB">0</div>
            </div>
        </div>
    </div>


    
    <div class="footer-auspiciantes">
        <img src="https://lh3.googleusercontent.com/u/0/d/1Q2krrcRKeNX8LeYFBKStBB8-mZAJ7-VP" class="logo-sponsor">
        <img src="https://lh3.googleusercontent.com/u/0/d/1CPn9kIDEj5lRpJcu2z1f--cKy3VN0X7Q" class="logo-sponsor">
        <img src="https://lh3.googleusercontent.com/u/0/d/1SzAQiKyloNwnmn_BnLQaO6p_eJSNjn8y" class="logo-sponsor">
        <img src="https://lh3.googleusercontent.com/u/0/d/1oisKHgPkNW1loGoAal74E8QCfiK2f6qp" class="logo-sponsor">
        <img src="https://lh3.googleusercontent.com/u/0/d/1MQ6tkM9c4UOamincvrZ3gREkyscX5C42" class="logo-sponsor">
        <img src="https://lh3.googleusercontent.com/u/0/d/1GIRiY5M1SjeCy-X4OQ-KznE7dNg6tDOw" class="logo-sponsor">
        <img src="https://lh3.googleusercontent.com/u/0/d/1aqgOJTjyUprGk_-CuwcMoV7JcLq_o39z" class="logo-sponsor">
        
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCZXCceFne0HnGewV6pdpJ50MKetv6gvL0", databaseURL: "https://padel-cliente-2-default-rtdb.firebaseio.com", projectId: "padel-cliente-2" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    let tiebreakActivo = false;
    let partidoFinalizadoGlobal = false;
    
    // Variables locales para cálculo independiente del tiempo
    let localRunP = false;
    let localSTP = 0;
    let localACP = 0;

    // Reloj interno del Display: corre siempre comparando el tiempo actual con el de inicio enviado por el juez
    setInterval(() => {
        if(localRunP && localSTP > 0) {
            let actualSeg = Math.floor((Date.now() - localSTP) / 1000);
            
            if(document.getElementById('timer-title').innerText === "TIEMPO PARTIDO") {
                let h=Math.floor(actualSeg/3600).toString().padStart(2,'0'), 
                    m=Math.floor((actualSeg%3600)/60).toString().padStart(2,'0'), 
                    s=(actualSeg%60).toString().padStart(2,'0');
                document.getElementById('val-timer').innerText = `${h}:${m}:${s}`;
            }
        }
    }, 1000);

    function updateTiempos(t) {
        if(!t) return;
        
        // Sincronización de flags de tiempo real
        localRunP = t.runP;
        localSTP = t.sTP;
        localACP = t.acP;

        if(t.vPel) {
            document.getElementById('val-timer').innerText = t.tPel;
            document.getElementById('timer-title').innerText = "CALENTAMIENTO";
        } else {
            document.getElementById('timer-title').innerText = "TIEMPO PARTIDO";
            // Si el cronómetro no está corriendo (pausado), mostramos el valor estático
            if(!localRunP) document.getElementById('val-timer').innerText = t.tPar;
        }
        
        const avisoTopCambio = document.getElementById('aviso-tv-top');
        const avisoFinalTop = document.getElementById('aviso-final-top');
        const cartelGigante = document.getElementById('cartel-final');
        const avisoTb = document.getElementById('aviso-tiebreak-tv');

        tiebreakActivo = t.tiebreak;
        partidoFinalizadoGlobal = t.modoFinal || t.finalizado;

        if(t.cartelGigante) {
            cartelGigante.style.display = 'flex';
            avisoFinalTop.style.display = 'none';
            avisoTopCambio.style.display = 'none';
            avisoTb.style.display = 'none';
        } else {
            cartelGigante.style.display = 'none';
            if(partidoFinalizadoGlobal) {
                avisoFinalTop.style.display = 'flex';
                avisoTopCambio.style.display = 'none';
                avisoTb.style.display = 'none';
            } else {
                avisoFinalTop.style.display = 'none';
                if(t.vDesc && t.tDesc > 0) { 
                    avisoTopCambio.style.display = 'flex'; 
                    document.getElementById('descanso-tv-q').innerText = t.tDesc; 
                } else { 
                    avisoTopCambio.style.display = 'none'; 
                }
                if(tiebreakActivo) {
                    avisoTb.style.display = 'flex';
                    avisoTb.innerText = t.esSTB ? "SUPER TIE-BREAK" : "TIE-BREAK";
                } else {
                    avisoTb.style.display = 'none';
                }
            }
        }

        document.getElementById('pA').classList.toggle('modo-tb', tiebreakActivo);
        document.getElementById('pB').classList.toggle('modo-tb', tiebreakActivo);
    }

    function updateActual(d) {
        if(!d) return;
        document.getElementById('n0').innerText=d.n0; document.getElementById('n1').innerText=d.n1;
        document.getElementById('n2').innerText=d.n2; document.getElementById('n3').innerText=d.n3;
        document.getElementById('pA').innerText=d.p0; document.getElementById('pB').innerText=d.p1;
        document.getElementById('msg-tv-desc').innerText = d.msg;
        
        const avisoOro = document.getElementById('aviso-oro');
        if(d.oro && !tiebreakActivo && !partidoFinalizadoGlobal) {
            avisoOro.style.display = 'flex';
        } else {
            avisoOro.style.display = 'none';
        }

        [0,1,2].forEach(i => { 
            document.getElementById(`s${i+1}-0`).innerText = d.h0[i]; 
            document.getElementById(`s${i+1}-1`).innerText = d.h1[i]; 
        });
        for(let i=0; i<4; i++) document.getElementById(`b${i}`).style.display = (d.sIdx===i) ? 'block' : 'none';
    }

    db.ref("marcador/tiempos").on("value", (snap) => updateTiempos(snap.val()));
    db.ref("marcador/actual").on("value", (snap) => updateActual(snap.val()));
</script>
</body>
</html>
