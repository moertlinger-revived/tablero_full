<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>revived LIVE SCORE PRO - v11.6</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="config.js"></script>
    
    <style>
        /* CONFIGURACIÓN ESTRUCTURAL */
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .brand-header { 
            width: 100%; height: 60px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 40px; box-sizing: border-box; border-bottom: 2px solid #333; background: #0a0a0a; 
        }
        .title-main { font-size: 20px; font-weight: 900; color: #ccff00; text-transform: uppercase; letter-spacing: 2px; }
        .logo-top { height: 40px; object-fit: contain; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 20px; }

        /* ZONA DE TIEMPOS PROFESIONAL */
        .tiempos-container { display: flex; gap: 30px; background: rgba(255,255,255,0.05); padding: 15px 40px; border-radius: 50px; border: 1px solid #333; }
        .tiempo-item { display: flex; flex-direction: column; align-items: center; }
        .t-label { font-size: 10px; color: #888; font-weight: bold; letter-spacing: 1px; margin-bottom: 2px; }
        .t-val { font-family: 'Courier New', monospace; font-size: 24px; color: #ccff00; font-weight: bold; }

        /* TABLERO PRINCIPAL */
        .scoreboard { width: 95%; max-width: 1200px; display: grid; grid-template-columns: 1fr auto; gap: 10px; }
        
        .equipo-fila { background: #111; display: grid; grid-template-columns: 1fr 100px 100px 100px 200px; align-items: center; border-radius: 15px; overflow: hidden; border: 2px solid #222; margin-bottom: 10px; }
        
        .nombres-sector { padding: 20px 30px; display: flex; flex-direction: column; gap: 5px; border-right: 1px solid #222; position: relative; }
        .j-nombre { font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .saque-indicador { position: absolute; left: 10px; color: #ccff00; font-size: 20px; display: none; }
        .sirviendo .saque-indicador { display: block; }

        .set-box { font-size: 35px; font-weight: 800; text-align: center; color: #666; border-right: 1px solid #222; height: 100%; display: flex; align-items: center; justify-content: center; }
        .set-actual { color: #fff; background: rgba(204, 255, 0, 0.1); }
        
        .puntos-box { font-size: 80px; font-weight: 900; text-align: center; color: #ccff00; background: #000; display: flex; align-items: center; justify-content: center; }

        /* AVISOS */
        .aviso-oro { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #ccff00; color: #000; padding: 30px 60px; font-size: 50px; font-weight: 900; border-radius: 20px; display: none; z-index: 100; box-shadow: 0 0 100px rgba(204, 255, 0, 0.5); text-transform: uppercase; }

        #zona-peloteo { transition: opacity 0.5s ease; }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="title-main">Padel Vivo - Live Score</div>
        <img src="https://images.squarespace-cdn.com/content/v1/59232938893fc0c59807577c/1500336040854-C1C9N1P3H6N0C5Q7D7G1/logo-placeholder.png" class="logo-top">
    </div>

    <div class="main-content">
        <div class="tiempos-container">
            <div class="tiempo-item" id="zona-peloteo">
                <span class="t-label">CALENTAMIENTO</span>
                <span id="t-peloteo" class="t-val">05:00</span>
            </div>
            <div class="tiempo-item">
                <span class="t-label">TIEMPO DE PARTIDO</span>
                <span id="t-partido" class="t-val">00:00:00</span>
            </div>
        </div>

        <div class="scoreboard">
            <div class="tablero-datos">
                <div class="equipo-fila" id="eq0">
                    <div class="nombres-sector">
                        <span class="saque-indicador">●</span>
                        <span class="j-nombre" id="n0">JUGADOR 1A</span>
                        <span class="j-nombre" id="n1">JUGADOR 1B</span>
                    </div>
                    <div class="set-box" id="s1-0">0</div>
                    <div class="set-box" id="s2-0">0</div>
                    <div class="set-box" id="s3-0">0</div>
                    <div class="puntos-box" id="pA">0</div>
                </div>

                <div class="equipo-fila" id="eq1">
                    <div class="nombres-sector">
                        <span class="saque-indicador">●</span>
                        <span class="j-nombre" id="n2">JUGADOR 2A</span>
                        <span class="j-nombre" id="n3">JUGADOR 2B</span>
                    </div>
                    <div class="set-box" id="s1-1">0</div>
                    <div class="set-box" id="s2-1">0</div>
                    <div class="set-box" id="s3-1">0</div>
                    <div class="puntos-box" id="pB">0</div>
                </div>
            </div>
        </div>
    </div>

    <div id="aviso-oro" class="aviso-oro">Punto de Oro</div>

    <script>
        let tiebreakActivo = false;

        db.ref("marcador/actual").on("value", (snap) => {
            const data = snap.val();
            if(!data) return;
            
            // Sincronización de Nombres
            document.getElementById('n0').innerText = data.n0 || "J1A";
            document.getElementById('n1').innerText = data.n1 || "J1B";
            document.getElementById('n2').innerText = data.n2 || "J2A";
            document.getElementById('n3').innerText = data.n3 || "J2B";

            // Sincronización de Puntos y Sets
            document.getElementById('pA').innerText = data.p0 || "0";
            document.getElementById('pB').innerText = data.p1 || "0";
            
            tiebreakActivo = data.tb || false;

            // Historial de Sets
            [0, 1, 2].forEach(i => {
                document.getElementById(`s${i+1}-0`).innerText = (data.h0 && data.h0[i] !== undefined) ? data.h0[i] : 0;
                document.getElementById(`s${i+1}-1`).innerText = (data.h1 && data.h1[i] !== undefined) ? data.h1[i] : 0;
                
                // Resaltar set actual
                document.getElementById(`s${i+1}-0`).classList.toggle('set-actual', data.set === i);
                document.getElementById(`s${i+1}-1`).classList.toggle('set-actual', data.set === i);
            });

            // Indicador de Saque
            document.getElementById('eq0').classList.toggle('sirviendo', data.saqueIdx === 0 || data.saqueIdx === 1);
            document.getElementById('eq1').classList.toggle('sirviendo', data.saqueIdx === 2 || data.saqueIdx === 3);

            // Aviso Punto de Oro
            const avisoOro = document.getElementById('aviso-oro');
            if(data.oro && (data.p0 === "40" && data.p1 === "40")) {
                avisoOro.style.display = 'flex';
            } else {
                avisoOro.style.display = 'none';
            }

            // LÓGICA DE VISIBILIDAD DEL PELOTEO (TU PETICIÓN)
            const zonaPeloteo = document.getElementById('zona-peloteo');
            if (data.visPeloteo === false) {
                zonaPeloteo.style.opacity = "0";
                setTimeout(() => { zonaPeloteo.style.visibility = "hidden"; }, 500);
            } else {
                zonaPeloteo.style.visibility = "visible";
                zonaPeloteo.style.opacity = "1";
            }

            // Sincronización de Relojes desde DB
            if (data.tiempos) {
                actualizarRelojes(data.tiempos.partido || 0, data.tiempos.peloteo || 0);
            }
        });

        function actualizarRelojes(segP, segPel) {
            // Reloj Partido
            let h = Math.floor(segP / 3600), m = Math.floor((segP % 3600) / 60), s = segP % 60;
            document.getElementById('t-partido').innerText = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            
            // Reloj Peloteo
            let mp = Math.floor(segPel / 60), sp = segPel % 60;
            document.getElementById('t-peloteo').innerText = 
                `${mp.toString().padStart(2,'0')}:${sp.toString().padStart(2,'0')}`;
        }
    </script>
</body>
</html>
