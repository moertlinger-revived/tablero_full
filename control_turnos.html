<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff - Control de Pistas</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="config.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 15px; display: flex; justify-content: center; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { color: #ccff00; text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 14px; font-weight: bold; }
        select, input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #333; background: #2a2a2a; color: white; font-size: 16px; font-weight: bold; outline: none; transition: 0.3s; }
        select:focus, input:focus { border-color: #ccff00; }
        .btn { width: 100%; padding: 15px; margin-bottom: 12px; border: none; border-radius: 12px; font-weight: 900; font-size: 14px; text-transform: uppercase; cursor: pointer; transition: 0.3s; color: black; letter-spacing: 0.5px; }
        .btn-aviso { background: #ccff00; box-shadow: 0 4px 15px rgba(204, 255, 0, 0.3); }
        .btn-aviso:hover { background: #e6ff80; transform: translateY(-2px); }
        .btn-staff { background: #333; color: white; border: 1px solid #444; }
        .btn-staff:hover { background: #444; }
        .btn-danger { background: #ff4d4d; color: white; margin-top: 10px; }
        .btn-danger:hover { background: #ff3333; }
    </style>
</head>
<body>

    <div class="card">
        <h2>GESTIÓN DE PISTAS</h2>

        <label>CANCHA</label>
        <select id="numCancha">
            <option value="1">CANCHA 1</option>
            <option value="2">CANCHA 2</option>
            <option value="3">CANCHA 3</option>
            <option value="4">CANCHA 4</option>
        </select>

        <button class="btn btn-aviso" onclick="lanzarAvisoCancha()">📢 LANZAR AVISO CANCHA</button>
        <button class="btn btn-staff" onclick="prepararTurno()">🎾 MARCAR COMO TURNO</button>
        <button class="btn btn-staff" onclick="confirmarLargada()">✅ CONFIRMAR LARGADA</button>
        
        <hr style="border: 0; border-top: 1px solid #333; margin: 25px 0;">

        <label>MENSAJE PERSONALIZADO</label>
        <input type="text" id="textoLibre" placeholder="Ej: PREMIACIÓN FINALIZADA">
        <button class="btn btn-aviso" onclick="lanzarAvisoLibre()">📢 LANZAR AVISO ESPECIAL</button>

        <button class="btn btn-danger" onclick="vaciarCancha()">⚠️ VACIAR DATOS CANCHA</button>
    </div>

    <script>
        const db = firebase.database();

        async function lanzarAvisoCancha() {
            const c = document.getElementById('numCancha').value;
            const snapshot = await db.ref(`torneo/canchas/c${c}`).once('value');
            const datosCancha = snapshot.val();

            if (datosCancha && datosCancha.partido) {
                db.ref("torneo/aviso_actual").set({
                    partido: datosCancha.partido,
                    cancha: datosCancha.cancha,
                    activo: true,
                    confirmado: datosCancha.confirmado || false
                });
            } else { alert(`La CANCHA ${c} está vacía.`); }
        }

        function lanzarAvisoLibre() {
            const texto = document.getElementById('textoLibre').value;
            if(!texto) return alert("Escribe un mensaje primero");
            db.ref("torneo/aviso_actual").set({
                partido: texto.toUpperCase(),
                cancha: "AVISO",
                activo: true,
                tipo: "especial"
            });
        }

        async function prepararTurno() {
            const c = document.getElementById('numCancha').value;
            // Confirmación añadida según pedido
            if (confirm(`¿Estás seguro de marcar la CANCHA ${c} como TURNO?`)) {
                db.ref(`torneo/canchas/c${c}`).set({ partido: "TURNO", cancha: c, confirmado: true });
                db.ref("torneo/aviso_actual/activo").set(false);
            }
        }

        function confirmarLargada() {
            const c = document.getElementById('numCancha').value;
            db.ref(`torneo/canchas/c${c}/confirmado`).set(true);
            db.ref("torneo/aviso_actual/activo").set(false);
        }

        async function vaciarCancha() {
            const c = document.getElementById('numCancha').value;
            if(confirm(`¿Deseas vaciar los datos de la CANCHA ${c}?`)) {
                db.ref(`torneo/canchas/c${c}`).remove();
                alert(`Cancha ${c} vaciada.`);
            }
        }
    </script>

</body>
</html>
