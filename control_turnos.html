<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff - Control de Pistas</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="config.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 15px; display: flex; justify-content: center; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { color: #ccff00; text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 14px; font-weight: bold; }
        select, input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; background: #2b2b2b; color: white; font-size: 16px; box-sizing: border-box; }
        
        /* Estilo para el contenedor del input y el botón de borrar */
        .input-group { position: relative; display: flex; align-items: center; }
        .input-group input { padding-right: 45px; } /* Espacio para que el texto no tape el botón */
        .btn-clear { 
            position: absolute; right: 10px; top: 12px;
            background: #444; color: white; border: none; 
            width: 30px; height: 30px; border-radius: 50%; 
            cursor: pointer; font-weight: bold; display: flex; 
            align-items: center; justify-content: center;
        }
        .btn-clear:hover { background: #666; }

        .btn-lanzar { background: #ccff00; color: black; font-weight: 900; height: 60px; font-size: 18px; border: none; border-radius: 12px; cursor: pointer; width: 100%; text-transform: uppercase; margin-bottom: 10px; }
        
        .btn-toggle-aviso { font-weight: bold; height: 50px; border: none; border-radius: 10px; cursor: pointer; width: 100%; text-transform: uppercase; margin-bottom: 20px; transition: 0.3s; }
        .aviso-off { background: #444; color: white; }
        .aviso-on { background: #ff4444; color: white; box-shadow: 0 0 15px rgba(255, 68, 68, 0.4); }

        .btn-confirmar { background: #28a745; color: white; font-weight: 900; height: 60px; border: none; border-radius: 12px; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 10px; }
        
        .grid-botones { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-turno { background: #444; color: white; font-weight: bold; height: 50px; border: none; border-radius: 10px; cursor: pointer; }
        .btn-vaciar { background: #880000; color: white; font-weight: bold; height: 50px; border: none; border-radius: 10px; cursor: pointer; }
        
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
        
        textarea { width: 100%; background: #2b2b2b; color: white; border-radius: 10px; padding: 12px; border: 1px solid #333; font-size: 16px; box-sizing: border-box; resize: none; margin-bottom: 10px; font-family: inherit; }
    </style>
</head>
<body>

<div class="card">
    <h2>Control de Pistas</h2>
    
    <label>SELECCIONAR CANCHA</label>
    <select id="numCancha">
        <option value="1">CANCHA 1</option><option value="2">CANCHA 2</option>
        <option value="3">CANCHA 3</option><option value="4">CANCHA 4</option>
        <option value="5">CANCHA 5</option><option value="6">CANCHA 6</option>
        <option value="7">CANCHA 7</option><option value="8">CANCHA 8</option>
    </select>
    
    <label>PAREJA A</label>
    <div class="input-group">
        <input type="text" id="p1" placeholder="Pareja 1">
        <button class="btn-clear" onclick="limpiarCampo('p1')">✕</button>
    </div>

    <label>PAREJA B</label>
    <div class="input-group">
        <input type="text" id="p2" placeholder="Pareja 2">
        <button class="btn-clear" onclick="limpiarCampo('p2')">✕</button>
    </div>
    
    <button class="btn-lanzar" onclick="prepararAviso()">Anunciar y Ubicar</button>
    <button id="btnToggle" class="btn-toggle-aviso aviso-off" onclick="toggleAviso()">Mostrar Aviso Gigante</button>
    <button class="btn-confirmar" onclick="confirmarLargada()">✅ JUGADORES EN PISTA (OK)</button>

    <hr>
    <label>AVISO LIBRE (TEXTO PERSONALIZADO)</label>
    <div class="input-group" style="display: block;">
        <textarea id="textoLibre" rows="2" placeholder="Ej: SORTEO EN 5 MINUTOS..."></textarea>
        <button class="btn-clear" style="top: 10px;" onclick="limpiarCampo('textoLibre')">✕</button>
    </div>
    <button class="btn-lanzar" style="background:#ffcc00; height: 50px; font-size: 15px;" onclick="lanzarAvisoLibre()">Lanzar Aviso Especial</button>

    <hr>
    <div class="grid-botones">
        <button class="btn-turno" onclick="prepararTurno()">MARCAR TURNO</button>
        <button class="btn-vaciar" onclick="vaciarCancha()">VACIAR PISTA</button>
    </div>
</div>

<script>
    let estadoAvisoActual = false;

    // Función para limpiar campos
    function limpiarCampo(id) {
        document.getElementById(id).value = "";
        document.getElementById(id).focus();
    }

    db.ref("torneo/aviso_actual/activo").on("value", (snap) => {
        estadoAvisoActual = snap.val();
        const btn = document.getElementById("btnToggle");
        if (estadoAvisoActual) {
            btn.innerText = "Ocultar Aviso Gigante";
            btn.className = "btn-toggle-aviso aviso-on";
        } else {
            btn.innerText = "Mostrar Aviso Gigante";
            btn.className = "btn-toggle-aviso aviso-off";
        }
    });

    async function verificarOcupada(c) {
        const snap = await db.ref(`torneo/canchas/c${c}`).once('value');
        return snap.exists();
    }

    async function prepararAviso() {
        const c = document.getElementById('numCancha').value;
        const p1 = document.getElementById('p1').value;
        const p2 = document.getElementById('p2').value;
        if(!p1 || !p2) return alert("Ingresa nombres de ambas parejas");
        if(await verificarOcupada(c)) {
            if(!confirm(`La CANCHA ${c} ya está ocupada. ¿Deseas borrar lo anterior?`)) return;
        }
        const info = { partido: `${p1.toUpperCase()} vs ${p2.toUpperCase()}`, cancha: c, activo: true, confirmado: false };
        db.ref(`torneo/canchas/c${c}`).set(info);
        db.ref("torneo/aviso_actual").set(info);
        
        // Limpiar campos automáticamente después de lanzar
        document.getElementById('p1').value = "";
        document.getElementById('p2').value = "";
    }

    async function toggleAviso() {
        if (estadoAvisoActual) {
            db.ref("torneo/aviso_actual/activo").set(false);
        } else {
            const c = document.getElementById('numCancha').value;
            const snap = await db.ref(`torneo/canchas/c${c}`).once('value');
            if (snap.exists()) {
                const datosCancha = snap.val();
                db.ref("torneo/aviso_actual").set({
                    partido: datosCancha.partido,
                    cancha: datosCancha.cancha,
                    activo: true,
                    confirmado: datosCancha.confirmado || false
                });
            } else { alert(`La CANCHA ${c} está vacía.`); }
        }
    }

    function lanzarAvisoLibre() {
        const texto = document.getElementById('textoLibre').value;
        if(!texto) return alert("Escribe un mensaje primero");
        db.ref("torneo/aviso_actual").set({
            partido: texto.toUpperCase(),
            cancha: "AVISO",
            activo: true,
            tipo: "especial"
        });
    }

    async function prepararTurno() {
        const c = document.getElementById('numCancha').value;
        // ÚNICA MODIFICACIÓN: Agregada pregunta de seguridad
        if (confirm(`¿Estás seguro de marcar la CANCHA ${c} como TURNO?`)) {
            db.ref(`torneo/canchas/c${c}`).set({ partido: "TURNO", cancha: c, confirmado: true });
            db.ref("torneo/aviso_actual/activo").set(false);
        }
    }

    function confirmarLargada() {
        const c = document.getElementById('numCancha').value;
        db.ref(`torneo/canchas/c${c}/confirmado`).set(true);
        db.ref("torneo/aviso_actual/activo").set(false);
    }

    async function vaciarCancha() {
        const c = document.getElementById('numCancha').value;
        if(confirm(`🚨 ¿Vaciar la CANCHA ${c}?`)) {
            db.ref(`torneo/canchas/c${c}`).remove();
            db.ref("torneo/aviso_actual/activo").set(false);
        }
    }
</script>
</body>
</html>
