<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff - Control de Pistas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 15px; display: flex; justify-content: center; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { color: #ccff00; text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 14px; font-weight: bold; }
        select, input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; background: #2b2b2b; color: white; font-size: 16px; box-sizing: border-box; }

        .btn-lanzar { background: #ccff00; color: black; font-weight: 900; height: 60px; font-size: 18px; border: none; border-radius: 12px; cursor: pointer; width: 100%; transition: 0.2s; text-transform: uppercase; margin-bottom: 10px; }
        .btn-ocultar { background: #444; color: white; font-weight: bold; height: 50px; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-bottom: 20px; text-transform: uppercase; }
        
        .btn-turno { background: #0088ff; color: white; font-weight: bold; height: 50px; border: none; border-radius: 10px; cursor: pointer; width: 100%; text-transform: uppercase; margin-bottom: 10px; }
        .btn-vaciar { background: #ff4444; color: white; font-weight: bold; height: 50px; border: none; border-radius: 10px; cursor: pointer; width: 100%; text-transform: uppercase; opacity: 0.9; }
        
        .opt-group { font-weight: bold; background: #000; }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Control de Torneo</h2>
        
        <label>CANCHA DESTINO</label>
        <select id="numCancha">
            <optgroup label="INDOOR" class="opt-group">
                <option value="1">CANCHA 1</option>
                <option value="2">CANCHA 2</option>
                <option value="3">CANCHA 3</option>
                <option value="4">CANCHA 4</option>
                <option value="5">CANCHA 5</option>
                <option value="6">CANCHA 6</option>
            </optgroup>
            <optgroup label="OUTDOOR" class="opt-group">
                <option value="7">CANCHA 7</option>
                <option value="8">CANCHA 8</option>
            </optgroup>
        </select>
        
        <label>PARTIDO DEL TORNEO</label>
        <input type="text" id="p1" placeholder="Pareja A">
        <input type="text" id="p2" placeholder="Pareja B">
        
        <button class="btn-lanzar" onclick="lanzarAviso()">Anunciar y Ubicar</button>
        <button class="btn-ocultar" onclick="ocultarAviso()">Ocultar Aviso Gigante</button>
        
        <hr>
        
        <label>ESTADO DE CANCHA</label>
        <button class="btn-turno" onclick="marcarTurno()">Marcar como "TURNO"</button>
        <button class="btn-vaciar" onclick="vaciarCancha()">Dejar Cancha VACÍA</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs", databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com", projectId: "padel-vivo" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function lanzarAviso() {
            const c = document.getElementById('numCancha').value;
            const p1 = document.getElementById('p1').value;
            const p2 = document.getElementById('p2').value;
            if(!p1 || !p2) return alert("Completa los jugadores");

            const info = { partido: `${p1.toUpperCase()} vs ${p2.toUpperCase()}`, cancha: c, activo: true };
            db.ref(`torneo/canchas/c${c}`).set(info);
            db.ref("torneo/aviso_actual").set(info);
        }

        function ocultarAviso() {
            db.ref("torneo/aviso_actual/activo").set(false);
        }

        function marcarTurno() {
            const c = document.getElementById('numCancha').value;
            db.ref(`torneo/canchas/c${c}`).set({
                partido: "TURNO",
                cancha: c,
                esTurno: true // Etiqueta opcional por si queremos darle otro color
            });
            // Aseguramos que no haya aviso gigante
            db.ref("torneo/aviso_actual/activo").set(false);
        }

        function vaciarCancha() {
            const c = document.getElementById('numCancha').value;
            db.ref(`torneo/canchas/c${c}`).remove();
            db.ref("torneo/aviso_actual/activo").set(false);
        }
    </script>
</body>
</html>
